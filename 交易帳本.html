<style>

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; }

.search-inp { width: 100%; background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 12px; box-sizing: border-box; }

.coin-row:active { border-color: #4FC3F7; }
.coin-thumb { width: 32px; height: 32px; border-radius: 50%; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.stat-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 12px; }
.stat-label { font-size: 9px; color: #546E7A; margin-bottom: 3px; }
.stat-val { font-size: 13px; font-weight: 700; color: #E0F0FF; }
.sparkline-wrap { height: 70px; margin: 10px 0; }
.progress-track { height: 4px; background: #2a2a2a; border-radius: 4px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg,#4FC3F7,#FFB74D); }
</style>

<body>
<div class="container" id="app"></div>
<script>
'use strict';
const STORAGE_KEY = 'trading_ledger_v1';
const BLOCKS = [
  { id:'crypto', label:'加密貨幣', sub:'Crypto',   accent:'#4FC3F7', glow:'rgba(79,195,247,0.12)', dark:'#060e17', currency:'USDT', qtyLabel:'數量' },
  { id:'tw',     label:'台股',     sub:'TW Stock', accent:'#81C784', glow:'rgba(129,199,132,0.12)',dark:'#060f06', currency:'TWD',  qtyLabel:'股數' },
  { id:'us',     label:'美股',     sub:'US Stock', accent:'#FFB74D', glow:'rgba(255,183,77,0.12)', dark:'#110d00', currency:'USD',  qtyLabel:'股數' },
];

// ── i18n ──
let lang = 'zh';
const L = {
  zh: { title:'交易帳本', add:'新增標的', del:'刪除', backup:'備份', import:'匯入', reset:'清除',
        date:'日期', qty:'數量', shares:'股數', price:'價格', principal:'本金', note:'備註',
        pnl:'損益', remaining:'剩餘量', remainShares:'剩餘股數', avgEntry:'均價', target:'目標價格',
        buy:'買', sell:'賣', create:'建立', cancel:'取消',
        emptyBuy:'點擊新增買入記錄', emptySell:'點擊新增賣出記錄',
        emptyAssets:'點擊「新增標的」開始記錄',
        saved:'✓ 已自動儲存', saving:'儲存中…', saveFail:'⚠ 儲存失敗',
        assets:'標的', linkCoin:'🔗 連結幣種', searchCoin:'搜尋幣種',
        searchPlaceholder:'輸入幣種名稱，例如 Dogecoin...',
        nowPrice:'現價', unrealized:'未實現損益', realized:'已實現損益',
        position:'持倉資訊', seeChart:'📊 查看走勢', noData:'無法取得價格資料', loading:'載入中...',
        delBuyConfirm:'確定刪除此買入記錄？', delSellConfirm:'確定刪除此賣出記錄？',
        delAssetConfirm:'確定刪除此標的？', resetConfirm:'確定清除所有資料？' },
  en: { title:'Trading Record', add:'Add', del:'Del', backup:'Backup', import:'Import', reset:'Reset',
        date:'Date', qty:'Qty', shares:'Shares', price:'Price', principal:'Principal', note:'Note',
        pnl:'P&L', remaining:'Remaining', remainShares:'Remaining', avgEntry:'Avg Entry', target:'Target',
        buy:'Buy', sell:'Sell', create:'Create', cancel:'Cancel',
        emptyBuy:'Tap to add buy', emptySell:'Tap to add sell',
        emptyAssets:'Tap "Add" to start',
        saved:'✓ Auto saved', saving:'Saving…', saveFail:'⚠ Save failed',
        assets:'asset(s)', linkCoin:'🔗 Link Coin', searchCoin:'Search Coin',
        searchPlaceholder:'Search e.g. Dogecoin, Bitcoin...',
        nowPrice:'Price', unrealized:'Unrealized P&L', realized:'Realized P&L',
        position:'YOUR POSITION', seeChart:'📊 Chart', noData:'Could not fetch price data', loading:'Loading...',
        delBuyConfirm:'Delete this buy record?', delSellConfirm:'Delete this sell record?',
        delAssetConfirm:'Delete this asset?', resetConfirm:'Clear all data?' },
};
function t(k) { return (L[lang] || L.zh)[k] || k; }
window.setLang = function(l) { lang = l; render(); };

// ── Data ──
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function emptyBuyRow()  { return { id:uid(), date:'', buyPrice:'', buyQty:'', reason:'' }; }
function emptySellRow() { return { id:uid(), date:'', sellQty:'', sellPrice:'' }; }
function emptyAsset(name) { return { id:uid(), name, buyRows:[], sellRows:[], targetPrice:'', coinId:'', coinSymbol:'' }; }

let data = { crypto:[], tw:[], us:[] };
let _addingBid = null;
const collapsedBlocks = {};
const collapsedAssets = {};
let saveTimer = null;

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) data = JSON.parse(r); } catch(e) {}
}
function saveData() {
  clearTimeout(saveTimer);
  updateSaveStatus('saving');
  saveTimer = setTimeout(function() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); updateSaveStatus('saved'); }
    catch(e) { updateSaveStatus('saveFail'); }
  }, 600);
}
function updateSaveStatus(k) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = t(k);
  el.style.color = k==='saved'?'#4CAF50':k==='saving'?'#FFB74D':'#EF5350';
}

// ── Helpers ──
function hex(color, alpha) {
  const r=parseInt(color.slice(1,3),16), g=parseInt(color.slice(3,5),16), b=parseInt(color.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
function calcAvgCost(buyRows) {
  const valid = buyRows.filter(function(r){ return parseFloat(r.buyPrice)>0 && parseFloat(r.buyQty)>0; });
  const qty  = valid.reduce(function(s,r){ return s+parseFloat(r.buyQty); }, 0);
  const cost = valid.reduce(function(s,r){ return s+parseFloat(r.buyPrice)*parseFloat(r.buyQty); }, 0);
  return qty>0 ? cost/qty : null;
}
function updateMirror(inp) {
  const m = inp.previousElementSibling;
  if (m && m.classList.contains('mirror')) m.textContent = inp.value || '\u00a0';
}
function fmtNum(n) {
  if (n===null || n===undefined || isNaN(n)) return '—';
  const a = Math.abs(n);
  if (a>=1e9) return (n/1e9).toFixed(2)+'B';
  if (a>=1e6) return (n/1e6).toFixed(2)+'M';
  if (a>=1000) return n.toLocaleString(undefined,{maximumFractionDigits:2});
  return n.toFixed(a<0.01?6:a<1?4:2);
}

// ── CoinGecko ──
const _priceCache = {};
const _searchCache = {};
let _searchTimer = null;

async function cgSearch(query) {
  if (_searchCache[query]) return _searchCache[query];
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/search?query='+encodeURIComponent(query));
    const d = await r.json();
    _searchCache[query] = (d.coins||[]).slice(0,8);
    return _searchCache[query];
  } catch(e) { return []; }
}

async function cgPrice(coinId) {
  const cached = _priceCache[coinId];
  if (cached && Date.now()-cached.ts < 60000) return cached.data;
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/coins/'+coinId+'?localization=false&tickers=false&community_data=false&developer_data=false&sparkline=true');
    const d = await r.json();
    const pd = {
      price: d.market_data.current_price.usd,
      change24h: d.market_data.price_change_percentage_24h,
      high24h: d.market_data.high_24h.usd,
      low24h: d.market_data.low_24h.usd,
      marketCap: d.market_data.market_cap.usd,
      volume24h: d.market_data.total_volume.usd,
      rank: d.market_cap_rank,
      sparkline: d.market_data.sparkline_7d ? d.market_data.sparkline_7d.price : [],
      name: d.name,
      symbol: d.symbol.toUpperCase(),
      thumb: d.image ? d.image.small : '',
    };
    _priceCache[coinId] = { data: pd, ts: Date.now() };
    return pd;
  } catch(e) { return null; }
}

function drawSparkline(canvasId, prices, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !prices || prices.length < 2) return;
  const W = canvas.offsetWidth || 300, H = canvas.offsetHeight || 70;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const min = Math.min.apply(null,prices), max = Math.max.apply(null,prices), range = max-min||1;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  prices.forEach(function(p,i){
    const x=(i/(prices.length-1))*W, y=H-((p-min)/range)*(H-8)-4;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=color.replace('rgb(','rgba(').replace(')',',0.1)'); ctx.fill();
}

// ── Overlay ──
function showOverlay(html) {
  let ov = document.getElementById('main-overlay');
  if (!ov) { ov=document.createElement('div'); ov.id='main-overlay'; ov.className='overlay'; document.body.appendChild(ov); }
  ov.innerHTML = html;
  ov.style.display = 'flex';
}
window.closeOverlay = function() {
  const ov = document.getElementById('main-overlay');
  if (ov) ov.style.display = 'none';
};

// ── Coin Search Overlay ──
window.showCoinSearch = function(bid, aid) {
  showOverlay(
    '<div class="overlay-hdr"><span class="overlay-title">&#128269; '+t('searchCoin')+'</span>'+
    '<button class="overlay-close" onclick="closeOverlay()">&#10005;</button></div>'+
    '<div class="overlay-body">'+
    '<input class="search-inp" id="cg-inp" placeholder="'+t('searchPlaceholder')+'" oninput="doCoinSearch(this.value,\''+bid+'\',\''+aid+'\')">'+
    '<div id="cg-results" style="color:#546E7A;font-size:12px;text-align:center;padding:20px">Type to search...</div>'+
    '</div>'
  );
  setTimeout(function(){ const i=document.getElementById('cg-inp'); if(i) i.focus(); }, 100);
};

window.doCoinSearch = function(q, bid, aid) {
  clearTimeout(_searchTimer);
  if (!q.trim()) return;
  _searchTimer = setTimeout(async function() {
    const el = document.getElementById('cg-results');
    if (el) el.innerHTML = '<div style="color:#546E7A;font-size:12px;text-align:center;padding:20px">'+t('loading')+'</div>';
    const results = await cgSearch(q);
    if (!el) return;
    if (!results.length) { el.innerHTML='<div style="color:#546E7A;font-size:12px;text-align:center;padding:20px">No results</div>'; return; }
    el.innerHTML = results.map(function(c) {
      const safeId=(c.id||'').replace(/'/g,'');
      const safeName=(c.name||'').replace(/'/g,'').replace(/"/g,'');
      const safeSym=(c.symbol||'').toUpperCase().replace(/'/g,'');
      return '<div class="coin-row" onclick="selectCoin(\''+bid+'\',\''+aid+'\',\''+safeId+'\',\''+safeName+'\',\''+safeSym+'\')">'+
        (c.thumb?'<img class="coin-thumb" src="'+c.thumb+'" onerror="this.style.display=\'none\'">':'<div style="width:32px;height:32px;background:#333;border-radius:50%"></div>')+
        '<div><div style="font-size:14px;font-weight:700;color:#fff">'+safeName+'</div>'+
        '<div style="font-size:11px;color:#546E7A">'+safeSym+' &middot; Rank #'+(c.market_cap_rank||'?')+'</div></div>'+
        '</div>';
    }).join('');
  }, 400);
};

window.selectCoin = function(bid, aid, coinId, coinName, coinSymbol) {
  const asset = data[bid].find(function(a){ return a.id===aid; });
  if (!asset) return;
  asset.coinId = coinId;
  asset.coinSymbol = coinSymbol;
  saveData();
  closeOverlay();
  reRenderAsset(bid, aid);
  window.refreshPrice(bid, aid);
};

// ── Price refresh ──
window.refreshPrice = async function(bid, aid) {
  const asset = data[bid].find(function(a){ return a.id===aid; });
  if (!asset || !asset.coinId) return;
  const pd = await cgPrice(asset.coinId);
  if (!pd) return;
  asset._price = pd;
  updatePriceBar(bid, aid, pd);
};

function updatePriceBar(bid, aid, pd) {
  const asset = data[bid].find(function(a){ return a.id===aid; });
  if (!asset) return;
  const avgCost = calcAvgCost(asset.buyRows);
  const totalBuy  = asset.buyRows.reduce(function(s,r){ return s+(parseFloat(r.buyQty)||0); },0);
  const totalSell = asset.sellRows.reduce(function(s,r){ return s+(parseFloat(r.sellQty)||0); },0);
  const holding = totalBuy - totalSell;
  const unrealized = avgCost&&holding>0 ? (pd.price-avgCost)*holding : null;
  const realized = asset.sellRows.reduce(function(s,r){
    const sq=parseFloat(r.sellQty), sp=parseFloat(r.sellPrice);
    return (!isNaN(sq)&&!isNaN(sp)&&avgCost) ? s+(sp-avgCost)*sq : s;
  },0);
  const el = document.getElementById('pbar-'+aid);
  if (!el) return;
  const up='#A5D6A7', dn='#EF9A9A';
  el.innerHTML =
    '<div class="price-cell" onclick="showChart(\''+bid+'\',\''+aid+'\')">'+
      '<div class="price-cell-label">'+t('nowPrice')+'</div>'+
      '<div class="price-cell-val">$'+fmtNum(pd.price)+'</div>'+
    '</div>'+
    '<div class="price-cell">'+
      '<div class="price-cell-label">'+t('avgEntry')+'</div>'+
      '<div class="price-cell-val">'+(avgCost?'$'+fmtNum(avgCost):'—')+'</div>'+
    '</div>'+
    '<div class="price-cell">'+
      '<div class="price-cell-label">'+t('unrealized')+'</div>'+
      '<div class="price-cell-val" style="color:'+(unrealized===null?'#546E7A':unrealized>=0?up:dn)+'">'+
        (unrealized===null?'—':(unrealized>=0?'+':'')+fmtNum(unrealized))+'</div>'+
    '</div>'+
    '<div class="price-cell">'+
      '<div class="price-cell-label">'+t('realized')+'</div>'+
      '<div class="price-cell-val" style="color:'+(realized>=0?up:dn)+'">'+
        (realized>=0?'+':'')+fmtNum(realized)+'</div>'+
    '</div>';
}

// ── Chart Overlay ──
window.showChart = async function(bid, aid) {
  const asset = data[bid].find(function(a){ return a.id===aid; });
  if (!asset||!asset.coinId) { window.showCoinSearch(bid,aid); return; }
  showOverlay(
    '<div class="overlay-hdr"><span class="overlay-title">'+t('loading')+'</span>'+
    '<button class="overlay-close" onclick="closeOverlay()">&#10005;</button></div>'+
    '<div class="overlay-body" style="display:flex;align-items:center;justify-content:center;color:#546E7A">'+t('loading')+'</div>'
  );
  const pd = await cgPrice(asset.coinId);
  if (!pd) {
    showOverlay(
      '<div class="overlay-hdr"><span class="overlay-title">Error</span>'+
      '<button class="overlay-close" onclick="closeOverlay()">&#10005;</button></div>'+
      '<div class="overlay-body" style="color:#EF5350;padding:20px">'+t('noData')+'</div>'
    );
    return;
  }
  asset._price = pd;
  updatePriceBar(bid, aid, pd);
  const avgCost = calcAvgCost(asset.buyRows);
  const totalBuy  = asset.buyRows.reduce(function(s,r){ return s+(parseFloat(r.buyQty)||0); },0);
  const totalSell = asset.sellRows.reduce(function(s,r){ return s+(parseFloat(r.sellQty)||0); },0);
  const holding = totalBuy-totalSell;
  const unrealized = avgCost&&holding>0?(pd.price-avgCost)*holding:null;
  const realized = asset.sellRows.reduce(function(s,r){
    const sq=parseFloat(r.sellQty), sp=parseFloat(r.sellPrice);
    return (!isNaN(sq)&&!isNaN(sp)&&avgCost)?s+(sp-avgCost)*sq:s;
  },0);
  const target = parseFloat(asset.targetPrice);
  const isUp = pd.change24h>=0;
  const color = isUp?'rgb(76,175,80)':'rgb(239,83,80)';
  const upC='#A5D6A7', dnC='#EF9A9A';
  const toTarget = !isNaN(target)&&target>0?((target-pd.price)/pd.price*100):null;
  const progressPct = avgCost&&!isNaN(target)&&target>avgCost?Math.min(100,Math.max(0,((pd.price-avgCost)/(target-avgCost)*100))):null;

  showOverlay(
    '<div class="overlay-hdr">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        (pd.thumb?'<img src="'+pd.thumb+'" style="width:32px;height:32px;border-radius:50%" onerror="this.style.display=\'none\'">':'')+
        '<div><div class="overlay-title">'+pd.name+'</div>'+
        '<div style="font-size:11px;color:#546E7A">'+pd.symbol+' &middot; Rank #'+(pd.rank||'?')+'</div></div>'+
      '</div>'+
      '<button class="overlay-close" onclick="closeOverlay()">&#10005;</button>'+
    '</div>'+
    '<div class="overlay-body">'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px">'+
        '<div><div style="font-size:26px;font-weight:800;color:#fff">$'+fmtNum(pd.price)+'</div>'+
        '<div style="font-size:11px;color:#546E7A">USD &middot; CoinGecko</div></div>'+
        '<div style="background:'+(isUp?'rgba(76,175,80,0.15)':'rgba(239,83,80,0.15)')+';border:1px solid '+(isUp?upC:dnC)+'44;border-radius:20px;padding:4px 12px;color:'+(isUp?upC:dnC)+';font-size:13px;font-weight:700">'+
          (isUp?'&#9650; +':'&#9660; ')+pd.change24h.toFixed(2)+'%</div>'+
      '</div>'+
      '<div class="sparkline-wrap"><canvas id="chart-spark" style="width:100%;height:70px"></canvas></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:10px;color:#546E7A;margin-bottom:12px">'+
        '<span>7 days</span><span>H: $'+fmtNum(pd.high24h)+' &middot; L: $'+fmtNum(pd.low24h)+'</span></div>'+
      '<div class="stat-grid">'+
        '<div class="stat-card"><div class="stat-label">Market Cap</div><div class="stat-val">$'+fmtNum(pd.marketCap)+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">24H Volume</div><div class="stat-val">$'+fmtNum(pd.volume24h)+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">24H High</div><div class="stat-val">$'+fmtNum(pd.high24h)+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">24H Low</div><div class="stat-val">$'+fmtNum(pd.low24h)+'</div></div>'+
      '</div>'+
      (avgCost?
        '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-top:12px">'+
          '<div style="font-size:10px;color:#546E7A;margin-bottom:10px;letter-spacing:0.1em">'+t('position')+'</div>'+
          '<div class="stat-grid">'+
            '<div class="stat-card"><div class="stat-label">'+t('avgEntry')+'</div><div class="stat-val" style="color:#81C784">$'+avgCost.toFixed(6)+'</div></div>'+
            '<div class="stat-card"><div class="stat-label">Holding</div><div class="stat-val">'+fmtNum(holding)+'</div></div>'+
            '<div class="stat-card"><div class="stat-label">'+t('unrealized')+'</div><div class="stat-val" style="color:'+(unrealized===null?'#546E7A':unrealized>=0?upC:dnC)+'">'+
              (unrealized===null?'—':(unrealized>=0?'+':'')+fmtNum(unrealized)+' USD')+'</div></div>'+
            '<div class="stat-card"><div class="stat-label">'+t('realized')+'</div><div class="stat-val" style="color:'+(realized>=0?upC:dnC)+'">'+
              (realized>=0?'+':'')+fmtNum(realized)+' USD</div></div>'+
            (toTarget!==null?'<div class="stat-card"><div class="stat-label">To '+t('target')+'</div><div class="stat-val" style="color:'+(toTarget>=0?'#FFB74D':dnC)+'">'+(toTarget>=0?'+':'')+toTarget.toFixed(2)+'%</div></div>':'')+
          '</div>'+
          (progressPct!==null?
            '<div style="margin-top:12px">'+
              '<div style="display:flex;justify-content:space-between;font-size:9px;color:#546E7A">'+
                '<span>Entry $'+avgCost.toFixed(4)+'</span><span>Now $'+pd.price.toFixed(4)+'</span><span>'+t('target')+' $'+target.toFixed(4)+'</span></div>'+
              '<div class="progress-track"><div class="progress-fill" style="width:'+progressPct+'%"></div></div>'+
            '</div>':'')+
        '</div>':'')+
    '</div>'
  );
  setTimeout(function(){ drawSparkline('chart-spark', pd.sparkline, color); }, 100);
};

// ── Render sell section ──
function renderSellSection(asset, block) {
  const avgCost = calcAvgCost(asset.buyRows);
  const totalBuyQty = asset.buyRows.reduce(function(s,r){ return s+(parseFloat(r.buyQty)||0); },0);
  const qtyLabel = block.id==='crypto' ? t('qty') : t('shares');
  const remLabel = block.id==='crypto' ? t('remaining') : t('remainShares');
  let cumSold=0, rowsHtml='';
  if (asset.sellRows.length===0) {
    rowsHtml = '<tr>'+
      '<td class="section-btn-td" data-action="addSell" data-bid="'+block.id+'" data-aid="'+asset.id+'" style="background:#2a1a1a;border:1px solid rgba(239,83,80,0.5)">'+
        '<div style="color:#EF9A9A">'+t('sell')+' &#xff0b;</div></td>'+
      '<td colspan="5" class="empty-hint">'+t('emptySell')+'</td>'+
      '</tr>';
  } else {
    asset.sellRows.forEach(function(row, i) {
      const sq=parseFloat(row.sellQty), sp=parseFloat(row.sellPrice);
      const pnl = (!isNaN(sq)&&!isNaN(sp)&&avgCost!==null)?(sp-avgCost)*sq:null;
      const pnlColor = pnl===null?'#546E7A':pnl>=0?'#A5D6A7':'#EF9A9A';
      const pnlText  = pnl===null?'—':(pnl>=0?'+':'')+pnl.toFixed(2);
      if (!isNaN(sq)) cumSold+=sq;
      const rem = totalBuyQty-cumSold;
      const remColor = rem<0?'#EF9A9A':rem===0?'#546E7A':'#A5D6A7';
      const remText  = totalBuyQty>0?rem.toLocaleString():'—';
      const btnTd = i===0
        ? '<td class="section-btn-td" rowspan="'+asset.sellRows.length+'" data-action="addSell" data-bid="'+block.id+'" data-aid="'+asset.id+'" style="background:#2a1a1a;border:1px solid rgba(239,83,80,0.5)"><div style="color:#EF9A9A">'+t('sell')+' &#xff0b;</div></td>'
        : '';
      const bg = i%2===0?'#222222':'#1a1a1a';
      rowsHtml += '<tr style="background:'+bg+'">'+btnTd+
        '<td style="min-width:110px"><span class="mirror">'+(row.date||'\u00a0')+'</span><input type="date" value="'+row.date+'" onchange="updateMirror(this);updateSellRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'date\',this.value)"></td>'+
        '<td><span class="mirror">'+(row.sellQty||'\u00a0')+'</span><input type="number" value="'+row.sellQty+'" placeholder="" onchange="updateMirror(this);updateSellRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'sellQty\',this.value)"></td>'+
        '<td><span class="mirror">'+(row.sellPrice||'\u00a0')+'</span><input type="number" value="'+row.sellPrice+'" placeholder="" onchange="updateMirror(this);updateSellRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'sellPrice\',this.value)"></td>'+
        '<td style="padding:4px 8px;color:'+pnlColor+';font-weight:700">'+pnlText+'</td>'+
        '<td style="padding:4px 8px;color:'+remColor+';font-weight:700">'+remText+'</td>'+
        '<td style="text-align:center;width:28px"><button class="del-btn" onclick="deleteSellRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\')">&#10005;</button></td>'+
        '</tr>';
    });
  }
  return '<div class="table-wrap"><div style="display:inline-block;min-width:100%">'+
    '<table><thead><tr>'+
    '<th style="width:40px;min-width:40px"></th>'+
    '<th>'+t('date')+'</th>'+
    '<th>'+qtyLabel+'</th>'+
    '<th>'+t('price')+'</th>'+
    '<th>'+t('pnl')+'</th>'+
    '<th>'+remLabel+'</th>'+
    '<th></th>'+
    '</tr></thead><tbody>'+rowsHtml+'</tbody></table>'+
    '</div></div>';
}

  const hasCoin = asset.coinId && asset.coinId.length > 0;
  const btnLabel = hasCoin ? t('seeChart')+' '+(asset.coinSymbol||'') : t('linkCoin');
  const btnOnclick = hasCoin
    ? 'refreshPrice(\''+block.id+'\',\''+asset.id+'\');showChart(\''+block.id+'\',\''+asset.id+'\')'
    : 'showCoinSearch(\''+block.id+'\',\''+asset.id+'\')';
  const initialBar = hasCoin
    ? '<div class="price-bar" id="pbar-'+asset.id+'">'+
        '<div class="price-cell"><div class="price-cell-label">'+t('nowPrice')+'</div><div class="price-cell-val" style="color:#546E7A">Tap &#128200;</div></div>'+
        '<div class="price-cell"><div class="price-cell-label">'+t('avgEntry')+'</div><div class="price-cell-val" style="color:#546E7A">—</div></div>'+
        '<div class="price-cell"><div class="price-cell-label">'+t('unrealized')+'</div><div class="price-cell-val" style="color:#546E7A">—</div></div>'+

// ── Render asset body ──
function renderAssetBody(asset, block) {
  return renderBuySection(asset, block)+
    '<div class="section-divider"></div>'+
    renderSellSection(asset, block)+
    renderPriceBar(asset, block);
}

// ── Update asset header P&L badge ──
function updateAssetHeader(asset, block) {
  const avgCost = calcAvgCost(asset.buyRows);
  const totalPnl = asset.sellRows.reduce(function(s,r){
    const sq=parseFloat(r.sellQty), sp=parseFloat(r.sellPrice);
    return (!isNaN(sq)&&!isNaN(sp)&&avgCost!==null)?s+(sp-avgCost)*sq:s;
  },0);
  const hasPnl = avgCost!==null && asset.sellRows.some(function(r){ return parseFloat(r.sellQty)>0&&parseFloat(r.sellPrice)>0; });
  const badge = document.querySelector('#asset-'+asset.id+' .pnl-badge');
  const nameDiv = document.querySelector('#asset-'+asset.id+' .asset-header > div');
  if (!nameDiv) return;
  if (hasPnl) {
    const color = totalPnl>=0?'#A5D6A7':'#EF9A9A';
    const bg    = totalPnl>=0?'rgba(76,175,80,0.15)':'rgba(239,83,80,0.15)';
    const text  = (totalPnl>=0?'&#9650; +':'&#9660; ')+totalPnl.toFixed(2)+' '+block.currency;
    if (badge) { badge.innerHTML=text; badge.style.color=color; badge.style.background=bg; }
    else { const s=document.createElement('span'); s.className='pnl-badge'; s.style.color=color; s.style.background=bg; s.innerHTML=text; nameDiv.appendChild(s); }
  } else if (badge) badge.remove();
}

// ── Re-render asset body only ──
function reRenderAsset(bid, aid) {
  const block = BLOCKS.find(function(b){ return b.id===bid; });
  const asset = data[bid].find(function(a){ return a.id===aid; });
  if (!block||!asset) return;
  const bodyEl = document.getElementById('abody-'+aid);
  if (bodyEl) { bodyEl.innerHTML = renderAssetBody(asset, block); updateAssetHeader(asset, block); }
}

// ── Data mutations ──
function updateBuyRow(bid,aid,rid,key,val) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  const r=a.buyRows.find(function(x){return x.id===rid;}); if(!r) return;
  r[key]=val; reRenderAsset(bid,aid); saveData();
}
function updateSellRow(bid,aid,rid,key,val) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  const r=a.sellRows.find(function(x){return x.id===rid;}); if(!r) return;
  r[key]=val; reRenderAsset(bid,aid); saveData();
}
function addBuyRow(bid,aid) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  const block=BLOCKS.find(function(b){return b.id===bid;});
  const qLabel = block.id==='crypto'?t('qty'):t('shares');
  const today=new Date().toISOString().slice(0,10);
  const date=prompt(t('date'), today); if(date===null) return;
  const qty=prompt(qLabel,''); if(qty===null) return;
  const price=prompt(t('price'),''); if(price===null) return;
  const row=emptyBuyRow(); row.date=date; row.buyQty=qty; row.buyPrice=price;
  a.buyRows.push(row); reRenderAsset(bid,aid); saveData();
}
function addSellRow(bid,aid) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  const block=BLOCKS.find(function(b){return b.id===bid;});
  const qLabel = block.id==='crypto'?t('qty'):t('shares');
  const today=new Date().toISOString().slice(0,10);
  const date=prompt(t('date'), today); if(date===null) return;
  const qty=prompt(qLabel,''); if(qty===null) return;
  const price=prompt(t('price'),''); if(price===null) return;
  const row=emptySellRow(); row.date=date; row.sellQty=qty; row.sellPrice=price;
  a.sellRows.push(row); reRenderAsset(bid,aid); saveData();
}
function deleteBuyRow(bid,aid,rid) {
  if(!confirm(t('delBuyConfirm'))) return;
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  a.buyRows=a.buyRows.filter(function(r){return r.id!==rid;}); reRenderAsset(bid,aid); saveData();
}
function deleteSellRow(bid,aid,rid) {
  if(!confirm(t('delSellConfirm'))) return;
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  a.sellRows=a.sellRows.filter(function(r){return r.id!==rid;}); reRenderAsset(bid,aid); saveData();
}
function updateAssetField(bid,aid,key,val) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  a[key]=val; saveData();
}
function deleteAsset(bid,aid) {
  if(!confirm(t('delAssetConfirm'))) return;
  data[bid]=data[bid].filter(function(a){return a.id!==aid;}); render(); saveData();
}

// ── Toggle collapse ──
function toggleBlock(id) {
  collapsedBlocks[id]=!collapsedBlocks[id];
  const body=document.getElementById('block-body-'+id);
  const arrow=document.getElementById('block-arrow-'+id);
  if(body) body.style.display=collapsedBlocks[id]?'none':'';
  if(arrow) arrow.textContent=collapsedBlocks[id]?'▶':'▼';
}
function toggleAsset(id) {
  collapsedAssets[id]=!collapsedAssets[id];
  const body=document.getElementById('abody-'+id);
  const arrow=document.getElementById('anarrow-'+id);
  if(body) body.style.display=collapsedAssets[id]?'none':'';
  if(arrow) arrow.textContent=collapsedAssets[id]?'▶':'▼';
}

// ── Add asset ──
function startAdd(bid) { _addingBid=bid; render(); }
function cancelAdd() { _addingBid=null; render(); }
function confirmAdd(bid) {
  const inp=document.getElementById('new-asset-'+bid);
  const name=inp?inp.value.trim():''; if(!name) return;
  const asset=emptyAsset(name);
  data[bid].push(asset); _addingBid=null; render(); saveData();
  if (bid==='crypto') setTimeout(function(){ window.showCoinSearch(bid, asset.id); }, 300);
}
function handleAddKey(e,bid) { if(e.key==='Enter') confirmAdd(bid); if(e.key==='Escape') cancelAdd(); }

// ── Export / Import ──
function exportJSON() {
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='交易紀錄_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(url);
}
function importJSON(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){ try{ data=JSON.parse(ev.target.result); saveData(); render(); alert('✅ 匯入成功！'); }catch(err){ alert('❌ 格式錯誤'); } };
  reader.readAsText(file); e.target.value='';
}
function resetAll() {
  if(!confirm(t('resetConfirm'))) return;
  localStorage.removeItem(STORAGE_KEY); data={crypto:[],tw:[],us:[]}; render(); updateSaveStatus('saved');
}

// ── Event delegation ──
document.addEventListener('click', function(e) {
  const td=e.target.closest('[data-action]');
  if(!td) return;
  if(td.dataset.action==='addBuy')  addBuyRow(td.dataset.bid, td.dataset.aid);
  if(td.dataset.action==='addSell') addSellRow(td.dataset.bid, td.dataset.aid);
});

// ── Full render ──
function render() {
  const statusEl=document.getElementById('save-status');
  const statusText=statusEl?statusEl.textContent:t('saved');
  const statusColor=statusEl?statusEl.style.color:'#4CAF50';

  const zhActive=lang==='zh'?' active':'';
  const enActive=lang==='en'?' active':'';
  const langToggle='<div class="lang-toggle">'+
    '<button class="lang-btn'+zhActive+'" data-lang="zh" onclick="setLang(this.dataset.lang)">中</button>'+
    '<button class="lang-btn'+enActive+'" data-lang="en" onclick="setLang(this.dataset.lang)">EN</button>'+
    '</div>';

  const tagsHtml=BLOCKS.map(function(b){
    const label=lang==='en'?b.sub:b.label;
    return '<span class="tag" style="background:'+hex(b.accent,0.1)+';border:1px solid '+hex(b.accent,0.25)+';color:'+b.accent+'">'+label+' &middot; '+data[b.id].length+' '+(lang==='en'?'asset(s)':'標的')+'</span>';
  }).join('');

  let blocksHtml='';
  BLOCKS.forEach(function(b){
    const assets=data[b.id];
    let assetsHtml='';
    if(assets.length===0){
      assetsHtml='<div class="empty-msg">'+t('emptyAssets')+'</div>';
    } else {
      assets.forEach(function(asset){
        const avgCost=calcAvgCost(asset.buyRows);
        const totalPnl=asset.sellRows.reduce(function(s,r){
          const sq=parseFloat(r.sellQty),sp=parseFloat(r.sellPrice);
          return (!isNaN(sq)&&!isNaN(sp)&&avgCost!==null)?s+(sp-avgCost)*sq:s;
        },0);
        const hasPnl=avgCost!==null&&asset.sellRows.some(function(r){return parseFloat(r.sellQty)>0&&parseFloat(r.sellPrice)>0;});
        const badge=hasPnl?'<span class="pnl-badge" style="color:'+(totalPnl>=0?'#A5D6A7':'#EF9A9A')+';background:'+(totalPnl>=0?'rgba(76,175,80,0.15)':'rgba(239,83,80,0.15)')+'">'+(totalPnl>=0?'&#9650; +':'&#9660; ')+totalPnl.toFixed(2)+' '+b.currency+'</span>':'';
        const bodyDisplay=collapsedAssets[asset.id]?'none':'';
        assetsHtml+='<div class="asset-block" id="asset-'+asset.id+'" style="border:1px solid #2a2a2a;background:#1c1c1c">'+
          '<div class="asset-header" style="background:#222;border-bottom:1px solid #333" onclick="toggleAsset(\''+asset.id+'\')">'+
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
              '<span id="anarrow-'+asset.id+'" style="color:'+b.accent+';font-size:13px">'+(collapsedAssets[asset.id]?'▶':'▼')+'</span>'+
              '<span class="asset-name" style="color:#fff">'+asset.name+'</span>'+badge+
            '</div>'+
            '<button class="delete-asset-btn" onclick="event.stopPropagation();deleteAsset(\''+b.id+'\',\''+asset.id+'\')">'+t('del')+'</button>'+
          '</div>'+
          '<div id="abody-'+asset.id+'" class="asset-body" style="display:'+bodyDisplay+'">'+renderAssetBody(asset,b)+'</div>'+
          '</div>';
      });
    }
    const label=lang==='en'?b.sub:b.label;
    const addBar=_addingBid===b.id?
      '<div class="add-asset-bar" style="background:'+hex(b.accent,0.05)+';border-color:'+hex(b.accent,0.15)+'">'+
        '<span style="color:'+b.accent+';font-size:11px">'+t('add')+':</span>'+
        '<input id="new-asset-'+b.id+'" placeholder="'+(b.id==='crypto'?'e.g. Doge, XRP':b.id==='tw'?'e.g. 2330, 0050':'e.g. AAPL, NVDA')+'" onkeydown="handleAddKey(event,\''+b.id+'\')">'+
        '<button class="confirm-btn" style="background:'+b.accent+'" onclick="confirmAdd(\''+b.id+'\')">'+t('create')+'</button>'+
        '<button class="cancel-btn" onclick="cancelAdd()">'+t('cancel')+'</button>'+
      '</div>':'';

    blocksHtml+='<div class="main-block" style="background:linear-gradient(160deg,'+b.dark+' 0%,#080808 100%);border:1px solid '+hex(b.accent,0.2)+';box-shadow:0 8px 40px '+b.glow+'">'+
      '<div class="main-header" style="border-bottom:1px solid '+hex(b.accent,0.15)+'" onclick="toggleBlock(\''+b.id+'\')">'+
        '<div style="display:flex;align-items:center">'+
          '<span id="block-arrow-'+b.id+'" style="color:'+(collapsedBlocks[b.id]?'#37474F':b.accent)+';font-size:13px;margin-right:8px">'+(collapsedBlocks[b.id]?'▶':'▼')+'</span>'+
          '<span class="main-title" style="color:'+b.accent+'">'+label+'</span>'+
          '<span class="main-count">'+assets.length+' '+(lang==='en'?'asset(s)':'個標的')+'</span>'+
        '</div>'+
        '<button class="add-main-btn" style="background:'+hex(b.accent,0.15)+';border-color:'+hex(b.accent,0.4)+';color:'+b.accent+'" onclick="event.stopPropagation();startAdd(\''+b.id+'\')">&#xff0b; '+t('add')+'</button>'+
      '</div>'+
      addBar+
      '<div id="block-body-'+b.id+'" class="main-body" style="display:'+(collapsedBlocks[b.id]?'none':'')+'">'+(collapsedBlocks[b.id]?'':assetsHtml)+'</div>'+
      '</div>';
  });

  document.getElementById('app').innerHTML=
    '<div class="page-label">PORTFOLIO TRADING LEDGER</div>'+
    '<div class="header-top">'+
      '<div class="page-title">'+t('title')+'</div>'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        langToggle+
        '<span id="save-status" class="save-status" style="color:'+statusColor+'">'+statusText+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="tag-row">'+tagsHtml+
      '<div class="btn-row">'+
        '<button class="btn" style="background:rgba(79,195,247,0.1);border:1px solid rgba(79,195,247,0.3);color:#4FC3F7" onclick="exportJSON()">&#8595; '+t('backup')+'</button>'+
        '<button class="btn" style="background:rgba(255,183,77,0.1);border:1px solid rgba(255,183,77,0.3);color:#FFB74D" onclick="document.getElementById(\'import-input\').click()">&#8593; '+t('import')+'</button>'+
        '<button class="btn" style="background:rgba(239,83,80,0.08);border:1px solid rgba(239,83,80,0.25);color:#EF5350" onclick="resetAll()">&#128465; '+t('reset')+'</button>'+
        '<input id="import-input" type="file" accept=".json" style="display:none" onchange="importJSON(event)">'+
      '</div>'+
    '</div>'+
    '<div class="divider-rainbow"></div>'+
    '<div style="height:16px"></div>'+
    blocksHtml+
    '<div class="footer-note">資料自動儲存於瀏覽器 · 定期點擊備份以防萬一</div>';

  if(_addingBid){
    const inp=document.getElementById('new-asset-'+_addingBid);
    if(inp) setTimeout(function(){ inp.focus(); },50);
  }
}

loadData();
render();
updateSaveStatus('saved');
</script>
</body>
</html>
