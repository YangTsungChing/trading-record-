<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>交易帳本</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; background: #0f0f0f; font-family: 'Courier New', monospace; color: #E0F0FF; padding: 16px 12px 40px; }
input[type=number] { -moz-appearance: textfield; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
.container { max-width: 900px; margin: 0 auto; }
.page-label { color: #1e2a35; font-size: 9px; letter-spacing: .25em; margin-bottom: 4px; }
.page-title { color: #E8F4FD; font-size: 26px; font-weight: 800; }
.save-status { font-size: 10px; }
.header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.tag-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.tag { border-radius: 20px; padding: 3px 12px; font-size: 10px; }
.btn-row { margin-left: auto; display: flex; gap: 8px; }
.btn { border-radius: 8px; padding: 6px 14px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; }
.divider-rainbow { height: 1px; background: linear-gradient(90deg, #4FC3F7, #81C784, #FFB74D, transparent); margin-top: 14px; opacity: .3; }
.main-block { border-radius: 16px; margin-bottom: 20px; }
.main-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-radius: 16px 16px 0 0; cursor: pointer; user-select: none; }
.main-title { font-size: 22px; font-weight: 800; }
.main-count { font-size: 10px; color: #37474F; margin-left: 8px; }
.main-body { padding: 14px 16px; background: #141414; border-radius: 0 0 16px 16px; }
.add-asset-bar { padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom-width: 1px; border-bottom-style: solid; }
.add-asset-bar input { border-radius: 6px; padding: 6px 10px; color: #E0F0FF; font-size: 12px; font-family: inherit; outline: none; width: 160px; border-width: 1px; border-style: solid; background: rgba(255,255,255,0.06); }
.empty-msg { text-align: center; color: #263238; padding: 28px 0; font-size: 12px; }
.asset-block { border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.asset-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; cursor: pointer; user-select: none; }
.asset-name { font-size: 20px; font-weight: 800; }
.pnl-badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-left: 8px; }
.asset-body { padding: 14px; background: #181818; }
.section-divider { height: 1px; background: #333; margin: 14px 0; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; table-layout: auto; white-space: nowrap; }
th { padding: 6px 10px; text-align: left; font-weight: 700; font-size: 14px; color: #E8F4FD; white-space: nowrap; }
th span { color: #8899AA; font-weight: 400; font-size: 14px; }
td { padding: 0; border-bottom: 1px solid rgba(255,255,255,.03); position: relative; }
td .mirror { display: block; visibility: hidden; white-space: pre; font-family: 'Courier New', monospace; font-size: 14px; padding: 4px 8px; min-width: 20px; pointer-events: none; }
td input { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; border: none; outline: none; color: #FFFFFF; font-size: 14px; font-family: 'Courier New', monospace; padding: 4px 8px; box-sizing: border-box; -webkit-appearance: none; font-weight: 600; }
td input[readonly] { color: #A5D6A7; background: rgba(255,255,255,.04); border-radius: 3px; cursor: default; }
td input[type=date] { position: relative; min-width: 110px; font-size: 12px; }
td input[type=date] + .mirror { min-width: 110px; }
td input::placeholder { color: #2a3a4a; }
.del-btn { background: none; border: none; color: #37474F; cursor: pointer; font-size: 12px; padding: 4px 6px; font-family: inherit; }
.del-btn:hover { color: #EF5350; }
.delete-asset-btn { background: none; border: 1px solid #444; color: #888; border-radius: 5px; padding: 3px 8px; font-size: 10px; cursor: pointer; font-family: inherit; }
.bottom-bar { display: flex; gap: 8px; margin-top: 10px; }
.avg-box { flex: 1; background: #1e2a1e; border: 1px solid rgba(129,199,132,0.3); border-radius: 8px; padding: 7px 12px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
.target-box { flex: 0 0 auto; background: #2a2010; border: 1px solid rgba(255,183,77,0.3); border-radius: 8px; padding: 7px 12px; display: flex; align-items: center; gap: 8px; }
.target-box input { background: transparent; border: none; border-bottom: 1px solid rgba(255,183,77,0.4); outline: none; color: #FFB74D; font-weight: 700; font-family: inherit; font-size: 13px; text-align: right; width: 80px; -webkit-appearance: none; }
.section-btn-td { cursor: pointer; text-align: center; vertical-align: middle; padding: 8px 4px; border-radius: 8px; width: 40px; min-width: 40px; }
.section-btn-td div { font-size: 13px; font-weight: 700; line-height: 1.8; }
.empty-hint { color: #37474F; font-size: 11px; padding: 8px 12px; }
.add-main-btn { border-radius: 8px; padding: 6px 14px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; border-width: 1px; border-style: solid; }
.confirm-btn { color: #000; border: none; border-radius: 6px; padding: 6px 14px; font-weight: 700; font-size: 11px; cursor: pointer; font-family: inherit; }
.cancel-btn { background: transparent; border: 1px solid #37474F; color: #546E7A; border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: inherit; }
.lang-toggle { display:flex; background:#222; border-radius:20px; padding:2px; gap:2px; }
.lang-btn { border:none; background:transparent; color:#546E7A; font-size:11px; font-weight:700; padding:4px 12px; border-radius:18px; cursor:pointer; font-family:inherit; }
.lang-btn.active { background:#333; color:#E8F4FD; }

.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; display:flex; flex-direction:column; }
.overlay-header { display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid #2a2a2a; }
.overlay-title { font-size:16px; font-weight:800; color:#fff; }
.overlay-close { background:#222; border:1px solid #444; color:#888; border-radius:50%; width:32px; height:32px; font-size:16px; cursor:pointer; font-family:inherit; }
.overlay-body { flex:1; overflow-y:auto; padding:16px; }
.search-input { width:100%; background:#222; border:1px solid #444; border-radius:10px; padding:10px 14px; color:#fff; font-size:14px; font-family:inherit; outline:none; margin-bottom:12px; box-sizing:border-box; }
.coin-result { display:flex; align-items:center; gap:12px; padding:10px 14px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; margin-bottom:8px; cursor:pointer; }
.coin-result:hover, .coin-result:active { border-color:#4FC3F7; background:#1e2a2e; }
.coin-thumb { width:32px; height:32px; border-radius:50%; }
.coin-name { font-size:14px; font-weight:700; color:#fff; }
.coin-symbol { font-size:11px; color:#546E7A; }
.price-row-bar { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.price-cell { flex:1; min-width:70px; background:#1e1e1e; border:1px solid #2a2a2a; border-radius:8px; padding:6px 10px; cursor:pointer; }
.price-cell-label { font-size:9px; color:#546E7A; margin-bottom:2px; }
.price-cell-val { font-size:12px; font-weight:700; color:#E0F0FF; }
.chart-btn { display:inline-flex; align-items:center; gap:6px; background:#222; border:1px solid #444; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:700; color:#8899AA; cursor:pointer; font-family:inherit; margin-top:8px; }
.sparkline-wrap { height:70px; margin:10px 0; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
.stat-card { background:#1e1e1e; border:1px solid #2a2a2a; border-radius:8px; padding:8px 12px; }
.stat-card-label { font-size:9px; color:#546E7A; margin-bottom:3px; }
.stat-card-val { font-size:13px; font-weight:700; color:#E0F0FF; }
.progress-bar-wrap { margin-top:12px; }
.progress-track { height:4px; background:#2a2a2a; border-radius:4px; overflow:hidden; margin-top:4px; }
.progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#4FC3F7,#FFB74D); }
.footer-note { text-align: center; color: #1a2030; font-size: 9px; letter-spacing: .1em; padding-top: 16px; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const STORAGE_KEY = 'trading_ledger_v1';
const BLOCKS = [
  { id:'crypto', label:'加密貨幣', sub:'Crypto',   accent:'#4FC3F7', glow:'rgba(79,195,247,0.12)', dark:'#060e17', currency:'USDT', qtyLabel:'數量 <span style="color:#8899AA">Qty</span>' },
  { id:'tw',     label:'台股',     sub:'TW Stock', accent:'#81C784', glow:'rgba(129,199,132,0.12)',dark:'#060f06', currency:'TWD',  qtyLabel:'股數 <span style="color:#8899AA">Shares</span>' },
  { id:'us',     label:'美股',     sub:'US Stock', accent:'#FFB74D', glow:'rgba(255,183,77,0.12)', dark:'#110d00', currency:'USD',  qtyLabel:'股數 <span style="color:#8899AA">Shares</span>' },
];

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function emptyBuyRow()  { return { id:uid(), date:'', buyPrice:'', buyQty:'', reason:'' }; }
function emptySellRow() { return { id:uid(), date:'', sellQty:'', sellPrice:'' }; }
function emptyAsset(name) { return { id:uid(), name, buyRows:[], sellRows:[], targetPrice:'', coinId:'', coinSymbol:'' }; }


let lang = 'zh';
const LABELS = {
  zh: { '買':'買','賣':'賣','加密貨幣':'加密貨幣','台股':'台股','美股':'美股','建立':'建立','取消':'取消',
        '日期':'日期','數量':'數量','股數':'股數','價格':'價格','本金':'本金','備註':'備註',
        '損益':'損益','剩餘量':'剩餘量','剩餘股數':'剩餘股數','均價':'均價','目標價格':'目標價格',
        '新增標的':'新增標的','備份':'備份','匯入':'匯入','清除':'清除',
        '交易帳本':'交易帳本','empty_buy':'點擊新增買入記錄','empty_sell':'點擊新增賣出記錄',
        '已自動儲存':'已自動儲存','儲存中…':'儲存中…','⚠ 儲存失敗':'⚠ 儲存失敗' },
  en: { '買':'Buy','賣':'Sell','加密貨幣':'Crypto','台股':'TW Stock','美股':'US Stock','建立':'Create','取消':'Cancel',
        '日期':'Date','數量':'Qty','股數':'Shares','價格':'Price','本金':'Principal','備註':'Note',
        '損益':'P&L','剩餘量':'Remaining','剩餘股數':'Remaining','均價':'Avg Entry','目標價格':'Target',
        '新增標的':'Add','備份':'Backup','匯入':'Import','清除':'Reset',
        '交易帳本':'Trading Record','empty_buy':'Tap to add buy','empty_sell':'Tap to add sell',
        '已自動儲存':'Auto saved','儲存中…':'Saving…','⚠ 儲存失敗':'⚠ Save failed',
        '刪除':'Del','確定刪除此買入記錄？':'Delete this buy record?',
        '確定刪除此賣出記錄？':'Delete this sell record?',
        '確定刪除此標的？':'Delete this asset?','確定清除所有資料？':'Clear all data?' }
};
function t(k) { return (LABELS[lang]||LABELS.zh)[k] || k; }
window.setLang = function(l) { lang=l; render(); };

let data = { crypto:[], tw:[], us:[] };
let addingBlock = null;
const collapsedBlocks = {};
const collapsedAssets = {};
let saveTimer = null;

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) data = JSON.parse(r); } catch {}
}
function saveData() {
  clearTimeout(saveTimer);
  updateSaveStatus('saving');
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); updateSaveStatus('saved'); }
    catch { updateSaveStatus('error'); }
  }, 600);
}
function updateSaveStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = s==='saved'?t('已自動儲存'):s==='saving'?t('儲存中…'):t('⚠ 儲存失敗');
  el.style.color  = s==='saved'?'#4CAF50':s==='saving'?'#FFB74D':'#EF5350';
}

function hex(color, alpha) {
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
function calcAvgCost(buyRows) {
  const valid = buyRows.filter(r => parseFloat(r.buyPrice)>0 && parseFloat(r.buyQty)>0);
  const qty  = valid.reduce((s,r) => s+parseFloat(r.buyQty), 0);
  const cost = valid.reduce((s,r) => s+parseFloat(r.buyPrice)*parseFloat(r.buyQty), 0);
  return qty>0 ? cost/qty : null;
}

function updateMirror(inp) {
  const m = inp.previousElementSibling;
  if (m && m.classList.contains('mirror')) m.textContent = inp.value || '\u00a0';
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='交易紀錄備份_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(url);
}
function importJSON(e) {
  const file=e.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{ try { data=JSON.parse(ev.target.result); saveData(); render(); alert('✅ 匯入成功！'); } catch { alert('❌ 格式錯誤'); } };
  reader.readAsText(file); e.target.value='';
}
function resetAll() {
  if (!confirm('確定清除所有資料？')) return;
  localStorage.removeItem(STORAGE_KEY); data={crypto:[],tw:[],us:[]}; render(); updateSaveStatus('saved');
}

// ── Render buy section ──
function renderBuySection(asset, block) {
  const avgCost = calcAvgCost(asset.buyRows);
  const avgText = avgCost!==null ? avgCost.toFixed(4) : '—';

  let rowsHtml = '';
  if (asset.buyRows.length === 0) {
    rowsHtml = '<tr>'
      +'<td class="section-btn-td" data-action="addBuy" data-bid="'+block.id+'" data-aid="'+asset.id+'" style="background:#1e2a1e;border:1px solid rgba(129,199,132,0.5)">'
      +''+('<div style="color:#81C784">'+t('買')+' ＋</div>')+'</td>'
      +'<td colspan="6" class="empty-hint">'+t('empty_buy')+'</td>'
      +'</tr>';
  } else {
    asset.buyRows.forEach(function(row, i) {
      const p=parseFloat(row.buyPrice), q=parseFloat(row.buyQty);
      const principal = (!isNaN(p)&&!isNaN(q)&&p>0&&q>0) ? (p*q).toFixed(2) : '';
      const btnTd = i===0
        ? '<td class="section-btn-td" rowspan="'+asset.buyRows.length+'" data-action="addBuy" data-bid="'+block.id+'" data-aid="'+asset.id+'" style="background:#1e2a1e;border:1px solid rgba(129,199,132,0.5)">'+('<div style="color:#81C784">'+t('買')+' ＋</div>')+'</td>'
        : '';
      const bg = i%2===0 ? '#222222' : '#1a1a1a';
      rowsHtml += '<tr style="background:'+bg+'">'
        +btnTd
        +'<td style="min-width:110px"><span class="mirror">'+( row.date||'\u00a0')+'</span><input type="date" value="'+row.date+'" onchange="updateMirror(this);updateBuyRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'date\',this.value)"></td>'
        +'<td><span class="mirror" style="text-align:right">'+(row.buyQty||'\u00a0')+'</span><input type="number" value="'+row.buyQty+'" placeholder="" style="text-align:left" onchange="updateMirror(this);updateBuyRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'buyQty\',this.value)"></td>'
        +'<td><span class="mirror" style="text-align:right">'+(row.buyPrice||'\u00a0')+'</span><input type="number" value="'+row.buyPrice+'" placeholder="" style="text-align:left" onchange="updateMirror(this);updateBuyRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'buyPrice\',this.value)"></td>'
        +'<td><span class="mirror" style="text-align:right">'+(principal||'\u00a0')+'</span><input type="number" value="'+principal+'" readonly placeholder="—" style="text-align:left;color:#A5D6A7;background:rgba(255,255,255,0.04);border-radius:3px"></td>'
        +'<td><span class="mirror">'+(row.reason||'備註…')+'</span><input type="text" value="'+(row.reason||'')+'" placeholder="備註…" style="color:#B0BEC5" onchange="updateMirror(this);updateBuyRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'reason\',this.value)"></td>'
        +'<td style="text-align:center;width:28px"><button class="del-btn" onclick="deleteBuyRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\')">✕</button></td>'
        +'</tr>';
    });
  }

  return '<div class="table-wrap"><div style="display:inline-block;min-width:100%">'
    +'<table><thead><tr>'
    +'<th style="width:40px;min-width:40px"></th>'
    +'<th>'+t('日期')+'</th>'
    +'<th>'+t(block.id==="crypto"?'數量':'股數')+'</th>'
    +'<th>'+t('價格')+'</th>'
    +'<th>'+t('本金')+'</th>'
    +'<th>'+t('備註')+'</th>'
    +'<th></th>'
    +'</tr></thead><tbody>'+rowsHtml+'</tbody></table>'
    +'<div class="bottom-bar">'
    +'<div class="avg-box"><span style="color:#81C784;font-size:12px;font-weight:700">'+t('均價')+'</span>'
    +'<span style="color:#A5D6A7;font-weight:700;font-size:14px;margin:0 auto">'+avgText+'</span>'
    +'<span style="color:#546E7A;font-size:10px">'+block.currency+'</span></div>'
    +'<div class="target-box"><span style="color:#FFB74D;font-size:12px;font-weight:700">'+t('目標價格')+'</span>'
    +'<input type="number" value="'+(asset.targetPrice||'')+'" placeholder="—" oninput="updateAssetField(\''+block.id+'\',\''+asset.id+'\',\'targetPrice\',this.value)">'
    +'<span style="color:#546E7A;font-size:10px">'+block.currency+'</span></div>'
    +'</div>'
    +'</div></div>';
}

// ── Render sell section ──
function renderSellSection(asset, block) {
  const avgCost = calcAvgCost(asset.buyRows);
  const totalBuyQty = asset.buyRows.reduce(function(s,r){ return s+(parseFloat(r.buyQty)||0); }, 0);
  const sellQtyLabel = block.id==='crypto' ? '數量 <span style="color:#8899AA">Qty</span>' : '股數 <span style="color:#8899AA">Shares</span>';
  const remainLabel  = block.id==='crypto' ? '剩餘量 <span style="color:#8899AA">Remaining</span>' : '剩餘股數 <span style="color:#8899AA">Remaining</span>';

  let rowsHtml = '';
  if (asset.sellRows.length === 0) {
    rowsHtml = '<tr>'
      +'<td class="section-btn-td" data-action="addSell" data-bid="'+block.id+'" data-aid="'+asset.id+'" style="background:#2a1a1a;border:1px solid rgba(239,83,80,0.5)">'
      +''+('<div style="color:#EF9A9A">'+t('賣')+' ＋</div>')+'</td>'
      +'<td colspan="5" class="empty-hint">'+t('empty_sell')+'</td>'
      +'</tr>';
  } else {
    let cumSold = 0;
    asset.sellRows.forEach(function(row, i) {
      const sq=parseFloat(row.sellQty), sp=parseFloat(row.sellPrice);
      const pnl = (!isNaN(sq)&&!isNaN(sp)&&avgCost!==null) ? (sp-avgCost)*sq : null;
      const pnlColor = pnl===null?'#546E7A':pnl>=0?'#A5D6A7':'#EF9A9A';
      const pnlText  = pnl===null?'—':(pnl>=0?'+':'')+pnl.toFixed(2);
      if (!isNaN(sq)) cumSold+=sq;
      const rem = totalBuyQty - cumSold;
      const remColor = rem<0?'#EF9A9A':rem===0?'#546E7A':'#A5D6A7';
      const remText  = totalBuyQty>0 ? rem.toLocaleString() : '—';
      const btnTd = i===0
        ? '<td class="section-btn-td" rowspan="'+asset.sellRows.length+'" data-action="addSell" data-bid="'+block.id+'" data-aid="'+asset.id+'" style="background:#2a1a1a;border:1px solid rgba(239,83,80,0.5)">'+('<div style="color:#EF9A9A">'+t('賣')+' ＋</div>')+'</td>'
        : '';
      const bg = i%2===0 ? '#222222' : '#1a1a1a';
      rowsHtml += '<tr style="background:'+bg+'">'
        +btnTd
        +'<td style="min-width:110px"><span class="mirror">'+(row.date||'\u00a0')+'</span><input type="date" value="'+row.date+'" onchange="updateMirror(this);updateSellRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'date\',this.value)"></td>'
        +'<td><span class="mirror" style="text-align:right">'+(row.sellQty||'\u00a0')+'</span><input type="number" value="'+row.sellQty+'" placeholder="" style="text-align:left" onchange="updateMirror(this);updateSellRow(\''+block.id+'\',\''+asset.id+'\',\''+row.id+'\',\'sellQty\',this.value)"></td>'

function updateAssetHeader(asset, block) {
  const avgCost = calcAvgCost(asset.buyRows);
  const totalPnl = asset.sellRows.reduce(function(s,r){
    const sq=parseFloat(r.sellQty),sp=parseFloat(r.sellPrice);
    return (!isNaN(sq)&&!isNaN(sp)&&avgCost!==null)?s+(sp-avgCost)*sq:s;
  }, 0);
  const hasPnl = avgCost!==null && asset.sellRows.some(function(r){ return parseFloat(r.sellQty)>0&&parseFloat(r.sellPrice)>0; });
  const badge = document.querySelector('#asset-'+asset.id+' .pnl-badge');
  const nameDiv = document.querySelector('#asset-'+asset.id+' .asset-header > div');
  if (!nameDiv) return;
  if (hasPnl) {
    const color = totalPnl>=0?'#A5D6A7':'#EF9A9A';
    const bg    = totalPnl>=0?'rgba(76,175,80,0.15)':'rgba(239,83,80,0.15)';
    const text  = (totalPnl>=0?'▲ +':'▼ ')+totalPnl.toFixed(2)+' '+block.currency;
    if (badge) { badge.textContent=text; badge.style.color=color; badge.style.background=bg; }
    else { const s=document.createElement('span'); s.className='pnl-badge'; s.style.color=color; s.style.background=bg; s.textContent=text; nameDiv.appendChild(s); }
  } else if (badge) badge.remove();
}

function updateSellRow(bid,aid,rid,key,val) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  const r=a.sellRows.find(function(x){return x.id===rid;}); if(!r) return;

}
function addBuyRow(bid,aid) {
  const a=data[bid].find(function(x){return x.id===aid;}); if(!a) return;
  const block=BLOCKS.find(function(b){return b.id===bid;});
  const qtyLabel = block.qtyLabel.replace(/<[^>]+>/g,'').trim();

function addSellRow(bid,aid) {

}

function deleteSellRow(bid,aid,rid) {

// ── CoinGecko ──
const priceCache = {};
const searchCache = {};

async function cgSearch(query) {
  if (searchCache[query]) return searchCache[query];
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/search?query='+encodeURIComponent(query));
    const d = await r.json();
    searchCache[query] = (d.coins||[]).slice(0,8);
    return searchCache[query];
  } catch(e) { return []; }
}

async function cgPrice(coinId) {
  const cached = priceCache[coinId];
  if (cached && Date.now()-cached.ts < 60000) return cached.data;
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/coins/'+coinId+'?localization=false&tickers=false&community_data=false&developer_data=false&sparkline=true');
    const d = await r.json();
    const data2 = {
      price: d.market_data.current_price.usd,
      change24h: d.market_data.price_change_percentage_24h,
      high24h: d.market_data.high_24h.usd,
      low24h: d.market_data.low_24h.usd,
      marketCap: d.market_data.market_cap.usd,
      volume24h: d.market_data.total_volume.usd,
      rank: d.market_cap_rank,
      sparkline: d.market_data.sparkline_7d.price,
      name: d.name,
      symbol: d.symbol.toUpperCase(),
      thumb: d.image ? d.image.small : '',
    };
    priceCache[coinId] = { data: data2, ts: Date.now() };
    return data2;
  } catch(e) { return null; }
}

function drawSparkline(canvasId, prices, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !prices || prices.length < 2) return;
  const W = canvas.offsetWidth || 300;
  const H = canvas.offsetHeight || 70;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const min = Math.min.apply(null, prices);
  const max = Math.max.apply(null, prices);
  const range = max - min || 1;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  prices.forEach(function(p,i){
    const x=(i/(prices.length-1))*W;
    const y=H-((p-min)/range)*(H-8)-4;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function fmtNum(n) {
  if (n===null||n===undefined) return 'N/A';
  if (Math.abs(n)>=1e9) return (n/1e9).toFixed(2)+'B';
  if (Math.abs(n)>=1e6) return (n/1e6).toFixed(2)+'M';
  if (Math.abs(n)>=1000) return n.toLocaleString(undefined,{maximumFractionDigits:2});
  return n.toFixed(Math.abs(n)<0.01?6:Math.abs(n)<1?4:2);
}

function updatePriceRow(bid, aid, pdata) {
  var asset = data[bid].find(function(a){ return a.id===aid; });
  if (!asset) return;
  var avgCost = calcAvgCost(asset.buyRows);
  var totalBuy = asset.buyRows.reduce(function(s,r){ return s+(parseFloat(r.buyQty)||0); }, 0);
  var totalSell = asset.sellRows.reduce(function(s,r){ return s+(parseFloat(r.sellQty)||0); }, 0);
  var holding = totalBuy - totalSell;
  var unrealized = avgCost && holding>0 ? (pdata.price-avgCost)*holding : null;
  var realized = asset.sellRows.reduce(function(s,r){
    var sq=parseFloat(r.sellQty), sp=parseFloat(r.sellPrice);
    return (!isNaN(sq)&&!isNaN(sp)&&avgCost) ? s+(sp-avgCost)*sq : s;
  }, 0);
  var el = document.getElementById('price-row-'+aid);
  if (!el) return;
  var up='#A5D6A7', dn='#EF9A9A';
  el.innerHTML =
    '<div class="price-cell" onclick="showChart(''+bid+'',''+aid+'')">'+
      '<div class="price-cell-label">&#128200; Price</div>'+
      '<div class="price-cell-val">$'+fmtNum(pdata.price)+'</div>'+
    '</div>'+
    '<div class="price-cell">'+
      '<div class="price-cell-label">Avg Entry</div>'+
      '<div class="price-cell-val">'+(avgCost ? '$'+fmtNum(avgCost) : '&#8212;')+'</div>'+
    '</div>'+
    '<div class="price-cell">'+
      '<div class="price-cell-label">Unrealized P&amp;L</div>'+
      '<div class="price-cell-val" style="color:'+(unrealized===null?'#546E7A':unrealized>=0?up:dn)+'">'+
        (unrealized===null ? '&#8212;' : (unrealized>=0?'+':'')+fmtNum(unrealized))+
      '</div>'+
    '</div>'+
    '<div class="price-cell">'+
      '<div class="price-cell-label">Realized P&amp;L</div>'+
      '<div class="price-cell-val" style="color:'+(realized>=0?up:dn)+'">'+
        (realized>=0?'+':'')+fmtNum(realized)+
      '</div>'+
    '</div>';
}

window.showChart = async function(bid, aid) {
  var asset = data[bid].find(function(a){ return a.id===aid; });
  if (!asset || !asset.coinId) { showCoinSearch(bid, aid); return; }
  showOverlay('<div class="overlay-header"><span class="overlay-title">Loading...</span><button class="overlay-close" onclick="closeOverlay()">&#10005;</button></div><div class="overlay-body" style="background:#0f0f0f;display:flex;align-items:center;justify-content:center;color:#546E7A">Fetching price data...</div>');
  var pdata = await cgPrice(asset.coinId);
  if (!pdata) { showOverlay('<div class="overlay-header"><span class="overlay-title">Error</span><button class="overlay-close" onclick="closeOverlay()">&#10005;</button></div><div class="overlay-body" style="background:#0f0f0f;padding:20px;color:#EF5350">Could not fetch price data. Check your connection.</div>'); return; }
  asset._price = pdata;
  updatePriceRow(bid, aid, pdata);
  var avgCost = calcAvgCost(asset.buyRows);
  var totalBuy = asset.buyRows.reduce(function(s,r){ return s+(parseFloat(r.buyQty)||0); }, 0);
  var totalSell = asset.sellRows.reduce(function(s,r){ return s+(parseFloat(r.sellQty)||0); }, 0);
  var holding = totalBuy - totalSell;
  var unrealized = avgCost&&holding>0 ? (pdata.price-avgCost)*holding : null;
  var realized = asset.sellRows.reduce(function(s,r){
    var sq=parseFloat(r.sellQty), sp=parseFloat(r.sellPrice);
    return (!isNaN(sq)&&!isNaN(sp)&&avgCost) ? s+(sp-avgCost)*sq : s;
  }, 0);
  var target = parseFloat(asset.targetPrice);
  var isUp = pdata.change24h >= 0;
  var color = isUp ? '#4CAF50' : '#EF5350';
  var upC='#A5D6A7', dnC='#EF9A9A';
  var toTarget = !isNaN(target)&&target>0 ? ((target-pdata.price)/pdata.price*100) : null;
  var progressPct = avgCost&&!isNaN(target)&&target>avgCost ? Math.min(100,Math.max(0,((pdata.price-avgCost)/(target-avgCost)*100))) : null;

  showOverlay(
    '<div class="overlay-header" style="background:#0f0f0f">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        (pdata.thumb ? '<img src="'+pdata.thumb+'" style="width:32px;height:32px;border-radius:50%" onerror="this.style.display='none'">' : '')+
        '<div><div class="overlay-title">'+pdata.name+'</div>'+
        '<div style="font-size:11px;color:#546E7A">'+pdata.symbol+' &middot; Rank #'+(pdata.rank||'?')+'</div></div>'+
      '</div>'+
      '<button class="overlay-close" onclick="closeOverlay()">&#10005;</button>'+
    '</div>'+
    '<div class="overlay-body" style="background:#0f0f0f">'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px">'+
        '<div><div style="font-size:26px;font-weight:800;color:#fff">$'+fmtNum(pdata.price)+'</div>'+
        '<div style="font-size:11px;color:#546E7A">USD &middot; CoinGecko</div></div>'+
        '<div style="background:'+(isUp?'rgba(76,175,80,0.15)':'rgba(239,83,80,0.15)')+';border:1px solid '+(isUp?upC:dnC)+'44;border-radius:20px;padding:4px 12px;color:'+(isUp?upC:dnC)+';font-size:13px;font-weight:700">'+
          (isUp?'&#9650; +':'&#9660; ')+pdata.change24h.toFixed(2)+'%</div>'+
      '</div>'+
      '<div class="sparkline-wrap"><canvas id="chart-spark" style="width:100%;height:70px"></canvas></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:10px;color:#546E7A;margin-bottom:12px">'+
        '<span>7 days</span><span>H: $'+fmtNum(pdata.high24h)+' &middot; L: $'+fmtNum(pdata.low24h)+'</span>'+
      '</div>'+
      '<div class="stat-grid">'+
        '<div class="stat-card"><div class="stat-card-label">Market Cap</div><div class="stat-card-val">$'+fmtNum(pdata.marketCap)+'</div></div>'+
        '<div class="stat-card"><div class="stat-card-label">24H Volume</div><div class="stat-card-val">$'+fmtNum(pdata.volume24h)+'</div></div>'+
        '<div class="stat-card"><div class="stat-card-label">24H High</div><div class="stat-card-val">$'+fmtNum(pdata.high24h)+'</div></div>'+
        '<div class="stat-card"><div class="stat-card-label">24H Low</div><div class="stat-card-val">$'+fmtNum(pdata.low24h)+'</div></div>'+
      '</div>'+
      (avgCost ?
        '<div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-top:12px">'+
          '<div style="font-size:10px;color:#546E7A;margin-bottom:10px;letter-spacing:0.1em">YOUR POSITION</div>'+
          '<div class="stat-grid">'+
            '<div class="stat-card"><div class="stat-card-label">Avg Entry</div><div class="stat-card-val" style="color:#81C784">$'+avgCost.toFixed(6)+'</div></div>'+
            '<div class="stat-card"><div class="stat-card-label">Holding</div><div class="stat-card-val">'+fmtNum(holding)+'</div></div>'+
            '<div class="stat-card"><div class="stat-card-label">Unrealized P&amp;L</div><div class="stat-card-val" style="color:'+(unrealized===null?'#546E7A':unrealized>=0?upC:dnC)+'">'+
              (unrealized===null?'&#8212;':(unrealized>=0?'+':'')+fmtNum(unrealized)+' USD')+'</div></div>'+
            '<div class="stat-card"><div class="stat-card-label">Realized P&amp;L</div><div class="stat-card-val" style="color:'+(realized>=0?upC:dnC)+'">'+
              (realized>=0?'+':'')+fmtNum(realized)+' USD</div></div>'+
            (toTarget!==null?'<div class="stat-card"><div class="stat-card-label">To Target</div><div class="stat-card-val" style="color:'+(toTarget>=0?'#FFB74D':dnC)+'">'+(toTarget>=0?'+':'')+toTarget.toFixed(2)+'%</div></div>':'')+
          '</div>'+
          (progressPct!==null ?
            '<div class="progress-bar-wrap">'+
              '<div style="display:flex;justify-content:space-between;font-size:9px;color:#546E7A">'+
                '<span>Entry $'+avgCost.toFixed(4)+'</span><span>Now $'+pdata.price.toFixed(4)+'</span><span>Target $'+target.toFixed(4)+'</span>'+
              '</div>'+
              '<div class="progress-track"><div class="progress-fill" style="width:'+progressPct+'%"></div></div>'+
            '</div>' : '')+
        '</div>' : '')+
    '</div>'
  );
  setTimeout(function(){ drawSparkline('chart-spark', pdata.sparkline, color); }, 100);
};

loadData();
render();
updateSaveStatus('saved');
</script>
</body>
</html>
